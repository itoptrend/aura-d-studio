version: '3.9'

# Local dev only. docker-compose up -d, then:
#   npx prisma migrate dev
#   npm run db:seed
#   npm run dev

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: auradb
      POSTGRES_PASSWORD: auradb_local_dev
      POSTGRES_DB: aura_d_studio
    ports:
      - '5432:5432'
    volumes:
      - aura_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - aura_redis_data:/data

volumes:
  aura_postgres_data:
  aura_redis_data:
